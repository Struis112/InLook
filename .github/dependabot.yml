version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
    groups:
      patch-and-minor:
        update-types:
          - minor
          - patch
    # Major bumps of these crates require code adaptation (the WebView2 host
    # stack and the Win32 registry helper redesigned their builder/error APIs
    # in their 0.5x/0.6x releases). Patches and minors still come through;
    # majors should be done as a single coordinated upgrade PR.
    ignore:
      - dependency-name: wry
        update-types: ["version-update:semver-major"]
      - dependency-name: windows-registry
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Amsterdam
    open-pull-requests-limit: 5
